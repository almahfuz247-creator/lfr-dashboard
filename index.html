<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFR Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(75, 85, 99, 0.3);
        }
        input[type=range] {
            accent-color: #3b82f6;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-10">

    <!-- Header -->
    <header class="p-6 border-b border-slate-800 flex justify-between items-center sticky top-0 bg-slate-900 z-10">
        <div>
            <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">LFR MISSION CONTROL</h1>
            <p id="status-text" class="text-xs text-slate-400 uppercase tracking-widest mt-1">Status: Offline</p>
        </div>
        <button id="connectBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-bold text-sm transition-all shadow-lg shadow-blue-900/20">
            CONNECT ROBOT
        </button>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-6">

        <!-- PID Tuning Card -->
        <section class="glass p-5 rounded-2xl shadow-xl">
            <h2 class="text-sm font-semibold text-slate-400 mb-6 flex items-center gap-2">
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                PID PARAMETERS
            </h2>
            
            <div class="space-y-8">
                <!-- Kp -->
                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-medium">Proportional (Kp)</label>
                        <span id="kpVal" class="text-blue-400 font-mono">1.0</span>
                    </div>
                    <input type="range" id="kpRange" min="0" max="10" step="0.1" value="1.0" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                </div>

                <!-- Ki -->
                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-medium">Integral (Ki)</label>
                        <span id="kiVal" class="text-blue-400 font-mono">0.0</span>
                    </div>
                    <input type="range" id="kiRange" min="0" max="2" step="0.01" value="0.0" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                </div>

                <!-- Kd -->
                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-medium">Derivative (Kd)</label>
                        <span id="kdVal" class="text-blue-400 font-mono">0.0</span>
                    </div>
                    <input type="range" id="kdRange" min="0" max="20" step="0.5" value="0.0" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                </div>

                <!-- Speed -->
                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-medium uppercase tracking-tighter text-slate-400">Base Speed</label>
                        <span id="spdVal" class="text-cyan-400 font-mono font-bold text-lg">150</span>
                    </div>
                    <input type="range" id="spdRange" min="0" max="255" step="5" value="150" class="w-full h-3 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>
        </section>

        <!-- Command Buttons -->
        <section class="grid grid-cols-2 gap-4">
            <button onclick="sendCommand('START')" class="bg-emerald-600 hover:bg-emerald-500 p-4 rounded-xl font-bold flex flex-col items-center gap-2 transition-all">
                <span class="text-2xl">▶</span>
                RUN MISSION
            </button>
            <button onclick="sendCommand('STOP')" class="bg-rose-600 hover:bg-rose-500 p-4 rounded-xl font-bold flex flex-col items-center gap-2 transition-all">
                <span class="text-2xl">■</span>
                EMERGENCY STOP
            </button>
            <button onclick="sendCommand('CALIBRATE')" class="bg-amber-600 hover:bg-amber-500 p-4 rounded-xl font-bold flex flex-col items-center gap-2 transition-all col-span-2">
                CALIBRATE SENSORS
            </button>
        </section>

        <!-- Terminal Output -->
        <section class="bg-black/50 p-4 rounded-xl border border-slate-800 h-40 overflow-y-auto font-mono text-xs text-emerald-400" id="terminal">
            <div>> LFR Dashboard Ready. Waiting for connection...</div>
        </section>

    </main>

    <script>
        let btChar;

        async function connectBT() {
            log("Requesting Bluetooth device...", "info");
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['00001101-0000-1000-8000-00805f9b34fb'] }],
                    optionalServices: ['generic_access']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('00001101-0000-1000-8000-00805f9b34fb');
                btChar = await service.getCharacteristic('00001101-0000-1000-8000-00805f9b34fb');
                
                document.getElementById('status-text').innerText = "Status: Connected to " + device.name;
                document.getElementById('status-text').classList.replace('text-slate-400', 'text-green-400');
                log("Connection Established!", "success");
            } catch (err) {
                log("Error: " + err.message, "error");
            }
        }

        async function sendCommand(cmd) {
            if (!btChar) {
                log("Fail: Connect Bluetooth first", "error");
                return;
            }
            const encoder = new TextEncoder();
            await btChar.writeValue(encoder.encode(cmd + "\n"));
            log("Sent Command: " + cmd, "info");
        }

        async function sendVal(prefix, val) {
            if (!btChar) return;
            const encoder = new TextEncoder();
            await btChar.writeValue(encoder.encode(prefix + val + "\n"));
            log("Updated " + prefix.toUpperCase() + " to " + val, "info");
        }

        function log(msg, type) {
            const term = document.getElementById('terminal');
            const div = document.createElement('div');
            div.innerText = "> " + msg;
            if (type === 'error') div.className = "text-rose-500";
            if (type === 'success') div.className = "text-cyan-400";
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        // Slider Listeners
        const sliders = [
            {id: 'kpRange', valId: 'kpVal', prefix: 'p'},
            {id: 'kiRange', valId: 'kiVal', prefix: 'i'},
            {id: 'kdRange', valId: 'kdVal', prefix: 'd'},
            {id: 'spdRange', valId: 'spdVal', prefix: 's'}
        ];

        sliders.forEach(s => {
            document.getElementById(s.id).addEventListener('input', (e) => {
                document.getElementById(s.valId).innerText = e.target.value;
            });
            document.getElementById(s.id).addEventListener('change', (e) => {
                sendVal(s.prefix, e.target.value);
            });
        });

        document.getElementById('connectBtn').addEventListener('click', connectBT);
    </script>
</body>
</html>
